name: Android Build

on:
push:
branches:
- main
- feature/**
pull_request:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: "21"

  - name: Setup Gradle
    uses: gradle/actions/setup-gradle@v4

  - name: Build
    run: ./gradlew build
```

